<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo link AFAM</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6fb;
      color: #111827;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(720px, calc(100% - 48px));
      padding: 36px;
      border: 1px solid #dfe3ee;
      border-radius: 18px;
      background: white;
      box-shadow: 0 18px 45px rgba(30, 41, 75, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      margin: 0 0 22px;
      line-height: 1.55;
      color: #4b5563;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px 14px;
      border: 1px solid #cbd2e1;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 13px 18px;
      background: #4f46e5;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main>
    <h1>Portfolio AFAM condiviso</h1>
    <p id="descrizione">
      Questa pagina dimostra l'apertura dell'app desktop tramite un link
      personalizzato <strong>afam://</strong>.
    </p>

    <label for="link">Link condiviso</label>
    <input id="link" value="afam://1/1" placeholder="Incolla qui il link generato dall'app">

    <button type="button" onclick="apriPortfolio()">Apri portfolio condiviso</button>

    <p class="hint">
      Il browser potrebbe chiedere conferma prima di aprire l'app desktop.
      Se l'app non si apre automaticamente, premi il pulsante.
    </p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const linkParam = params.get("link");
    if (linkParam) {
      document.getElementById("link").value = linkParam;
      document.getElementById("descrizione").innerHTML =
        "Apertura dell'app desktop AFAM in corso. Se il browser chiede conferma, accetta per visualizzare il portfolio condiviso.";
      window.setTimeout(apriPortfolio, 700);
    }

    function apriPortfolio() {
      const link = document.getElementById("link").value.trim();
      if (!link.startsWith("afam://")) {
        alert("Inserisci un link che inizi con afam://");
        return;
      }
      window.location.href = link;
    }
  </script>
</body>
</html>
